<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>Fusion Arts AR</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      html, body {
        width: 100%; height: 100%;
        overflow: hidden;
        background: transparent;
      }

      video {
        position: fixed !important;
        top: 0 !important; left: 0 !important;
        width: 100vw !important;
        height: 100vh !important;
        object-fit: cover !important;
        z-index: 0 !important;
      }

      canvas {
        position: fixed !important;
        top: 0 !important; left: 0 !important;
        width: 100vw !important;
        height: 100vh !important;
        background: transparent !important;
        z-index: 1 !important;
      }

      a-scene {
        width: 100vw !important;
        height: 100vh !important;
        position: fixed !important;
        top: 0 !important; left: 0 !important;
        z-index: 1 !important;
        background: transparent !important;
      }

      #loading-screen {
        position: fixed; inset: 0;
        background: #0a0a1a;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        z-index: 999; color: #fff;
        font-family: sans-serif; text-align: center;
        padding: 24px;
        transition: opacity 0.8s ease;
      }
      #loading-screen h1 {
        font-size: 22px; font-weight: 500;
        margin: 0 0 8px; color: #f5d97a;
      }
      #loading-screen p {
        font-size: 14px; opacity: 0.6; margin: 0 0 32px;
      }
      .spinner {
        width: 40px; height: 40px;
        border: 3px solid rgba(255,255,255,0.15);
        border-top-color: #f5d97a;
        border-radius: 50%;
        animation: spin 0.9s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }

      #hint {
        position: fixed; bottom: 40px; left: 50%;
        transform: translateX(-50%);
        background: rgba(0,0,0,0.6);
        color: #fff; font-family: sans-serif;
        font-size: 14px; padding: 10px 20px;
        border-radius: 24px;
        pointer-events: none;
        opacity: 1; transition: opacity 1s ease;
        z-index: 100; white-space: nowrap;
      }

      #debug {
        position: fixed; top: 12px; left: 12px; right: 12px;
        background: rgba(0,0,0,0.75);
        color: #0f0; font-family: monospace;
        font-size: 12px; padding: 8px 12px;
        border-radius: 8px;
        z-index: 200;
        line-height: 1.6;
      }
    </style>

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  </head>

  <body>

    <div id="loading-screen">
      <h1>Fusion Arts × House of Creativity</h1>
      <p>Loading AR experience…</p>
      <div class="spinner"></div>
    </div>

    <div id="debug">
      Status: starting…<br>
      Target: searching…
    </div>

    <div id="hint">Point camera at the building facade</div>

    <a-scene
      mindar-image="imageTargetSrc: target.mind; autoStart: true; uiLoading: no; uiError: no; uiScanning: no;"
      color-space="sRGB"
      renderer="colorManagement: true; physicallyCorrectLights: true; alpha: true"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-assets timeout="15000">
        <!-- Shark video: muted and loop required for mobile autoplay -->
        <video
          id="shark-video"
          src="shark.webm"
          loop
          muted
          playsinline
          webkit-playsinline
          crossorigin="anonymous"
        ></video>

        <!-- Whale disabled for now -->
        <!-- <a-asset-item id="whale-model" src="whale.glb"></a-asset-item> -->
      </a-assets>

      <a-camera></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">

        <a-light type="ambient" color="#ffffff" intensity="0.8"></a-light>
        <a-light type="directional" color="#ffffff" intensity="1.0"
          position="1 2 1"></a-light>

        <!-- Shark as transparent video on a flat plane.
             Width and height control the size of the plane — adjust to taste.
             The plane faces forward by default (toward the camera). -->
        <a-video
          src="#shark-video"
          position="0 0.8 0"
          width="1"
          height="0.6"
          rotation="0 0 0"
          material="transparent: true; alphaTest: 0.1; side: double"
          animation__float="property: position;
                            from: 0 0.8 0;
                            to: 0 1.0 0;
                            dur: 2500;
                            dir: alternate;
                            loop: true;
                            easing: easeInOutSine"
        ></a-video>

        <!-- Whale commented out for now -->
        <!--
        <a-entity
          gltf-model="#whale-model"
          animation-mixer="clip: *; loop: repeat; crossFadeDuration: 0.3"
          position="-0.5 0.5 0"
          scale="0.2 0.2 0.2"
          rotation="0 20 10"
          animation__float="property: position;
                     from: -0.5 0.5 0;
                     to: -0.5 0.7 0;
                     dur: 3000;
                     dir: alternate;
                     loop: true;
                     easing: easeInOutSine"
        ></a-entity>
        -->

      </a-entity>
    </a-scene>

    <script>
      const scene = document.querySelector('a-scene');
      const loading = document.getElementById('loading-screen');
      const hint = document.getElementById('hint');
      const debug = document.getElementById('debug');

      function setDebug(status, target) {
        debug.innerHTML = 'Status: ' + status + '<br>Target: ' + target;
      }

      scene.addEventListener('loaded', () => {
        setDebug('✅ A-Frame loaded', 'searching…');

        const canvas = document.querySelector('canvas');
        if (canvas) {
          canvas.style.background = 'transparent';
          canvas.style.backgroundColor = 'transparent';
        }

        // Force shark video to play — needed on some Android browsers
        const sharkVideo = document.getElementById('shark-video');
        if (sharkVideo) {
          sharkVideo.play().catch(e => {
            setDebug('⚠️ Video autoplay blocked: ' + e.message, 'searching…');
          });
        }

        setTimeout(() => {
          const video = document.querySelector('video[src="shark.webm"]');
          const cameraVideo = document.querySelector('video:not([src])') ||
                              document.querySelector('video[src=""]');

          // Fix camera feed video layering
          document.querySelectorAll('video').forEach(v => {
            if (!v.id) {
              // This is the Mind AR camera feed, not our shark
              v.style.position = 'fixed';
              v.style.top = '0';
              v.style.left = '0';
              v.style.width = '100vw';
              v.style.height = '100vh';
              v.style.objectFit = 'cover';
              v.style.zIndex = '0';
            }
          });

          setDebug('✅ A-Frame loaded — ready', 'searching…');
        }, 2000);

        setTimeout(() => {
          loading.style.opacity = '0';
          setTimeout(() => loading.style.display = 'none', 800);
        }, 1200);
      });

      scene.addEventListener('arReady', () => {
        setDebug('✅ Mind AR ready — camera live', 'searching…');

        // Fix camera video z-index — target videos without an id (Mind AR camera feed)
        document.querySelectorAll('video').forEach(v => {
          if (!v.id) {
            v.style.zIndex = '0';
            v.style.position = 'fixed';
            v.style.width = '100vw';
            v.style.height = '100vh';
            v.style.objectFit = 'cover';
          }
        });
      });

      scene.addEventListener('arError', (e) => {
        setDebug('❌ AR Error: ' + (e.detail || 'unknown'), '—');
      });

      scene.addEventListener('targetFound', () => {
        setDebug('✅ Mind AR ready', '🎯 TARGET FOUND!');
        hint.style.opacity = '0';

        // Ensure video is playing when target comes into view
        const sharkVideo = document.getElementById('shark-video');
        if (sharkVideo && sharkVideo.paused) {
          sharkVideo.play().catch(() => {});
        }
      });

      scene.addEventListener('targetLost', () => {
        setDebug('✅ Mind AR ready', 'searching…');
        hint.style.opacity = '1';
      });

      setTimeout(() => { hint.style.opacity = '0'; }, 5000);
    </script>

  </body>
</html>
