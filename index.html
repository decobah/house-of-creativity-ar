<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Fusion Arts AR</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      html, body {
        width: 100%; height: 100%;
        overflow: hidden;
        background: transparent;
      }

      video {
        position: fixed !important;
        top: 0 !important; left: 0 !important;
        width: 100vw !important;
        height: 100vh !important;
        object-fit: cover !important;
        z-index: 0 !important;
      }

      canvas {
        position: fixed !important;
        top: 0 !important; left: 0 !important;
        width: 100vw !important;
        height: 100vh !important;
        background: transparent !important;
        z-index: 1 !important;
      }

      a-scene {
        width: 100vw !important;
        height: 100vh !important;
        position: fixed !important;
        top: 0 !important; left: 0 !important;
        z-index: 1 !important;
        background: transparent !important;
      }

      #loading-screen {
        position: fixed; inset: 0;
        background: #0a0a1a;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        z-index: 9999; color: #fff;
        font-family: sans-serif; text-align: center;
        padding: 24px;
        transition: opacity 0.8s ease;
      }
      #loading-screen h1 {
        font-size: 22px; font-weight: 500;
        margin: 0 0 8px; color: #f5d97a;
      }
      #loading-screen p {
        font-size: 14px; opacity: 0.6; margin: 0 0 32px;
      }
      .spinner {
        width: 40px; height: 40px;
        border: 3px solid rgba(255,255,255,0.15);
        border-top-color: #f5d97a;
        border-radius: 50%;
        animation: spin 0.9s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }

      #tap-to-start {
        display: none;
        position: fixed; inset: 0;
        background: rgba(0,0,0,0.7);
        z-index: 9998;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        color: #fff;
        font-family: sans-serif;
        text-align: center;
        cursor: pointer;
      }
      #tap-to-start.visible { display: flex; }
      #tap-to-start p {
        font-size: 22px; font-weight: 500;
        color: #f5d97a; margin-bottom: 12px;
      }
      #tap-to-start span { font-size: 14px; opacity: 0.6; }

      #hint {
        position: fixed; bottom: 40px; left: 50%;
        transform: translateX(-50%);
        background: rgba(0,0,0,0.6);
        color: #fff; font-family: sans-serif;
        font-size: 14px; padding: 10px 20px;
        border-radius: 24px;
        pointer-events: none;
        opacity: 1; transition: opacity 1s ease;
        z-index: 9998; white-space: normal; max-width: 80vw; text-align: center;
      }

      #debug {
        position: fixed;
        top: 12px; left: 12px; right: 12px;
        background: rgba(0,0,0,0.85);
        color: #00ff00;
        font-family: monospace;
        font-size: 13px;
        font-weight: bold;
        padding: 10px 14px;
        border-radius: 8px;
        border: 1px solid #00ff00;
        z-index: 99999;
        pointer-events: none;
        line-height: 1.8;
      }
    </style>

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <script>
      const VERSION = '1.9';
      const DEBUG_MODE = false; // ← set to true to show the debug panel

      const ua = navigator.userAgent;
      const platform = navigator.platform || '';
      const maxTouch = navigator.maxTouchPoints || 0;

      const isAppleDevice = /iPad|iPhone|iPod/.test(ua) ||
                            (platform === 'MacIntel' && maxTouch > 1);
      const isSafariEngine = /WebKit/.test(ua) && !/Chrome/.test(ua);

      const shortUA = ua.substring(0, 60);

      // ─────────────────────────────────────────────────────────────
      // SHADER SELECTION
      //
      // Android / Chrome / Brave: WebM with native alpha channel.
      //   → webm-alpha shader: just reads color.a directly.
      //
      // iOS / Safari / iPad: WebM alpha is NOT decoded.
      //   → luma-matte shader: reads a side-by-side MP4 where
      //     LEFT half = RGB colour, RIGHT half = greyscale alpha mask.
      //
      // To create the luma-matte MP4 from your source footage, run:
      //   ffmpeg -i input.mov \
      //     -filter_complex "[0:v]split=2[l][r]; \
      //       [r]alphaextract,format=yuv420p[mask]; \
      //       [l]format=yuv420p[color]; \
      //       [color][mask]hstack[out]" \
      //     -map "[out]" -c:v libx264 -crf 18 -pix_fmt yuv420p \
      //     whale_shark_luma.mp4
      //
      // The resulting video is double-width (e.g. 2560×720 for 1280×720 source).
      // Name it whale_shark_luma.mp4 and add it to your repo.
      // ─────────────────────────────────────────────────────────────

      // Shader for Android/Chrome: reads WebM native alpha
      AFRAME.registerShader('webm-alpha', {
        schema: {
          src: { type: 'map', is: 'uniform' },
        },
        vertexShader: `
          varying vec2 vUv;
          void main() {
            vUv = uv;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
          }
        `,
        fragmentShader: `
          uniform sampler2D src;
          varying vec2 vUv;
          void main() {
            vec4 color = texture2D(src, vUv);
            if (color.a < 0.05) discard;
            gl_FragColor = color;
          }
        `
      });

      // Shader for iOS/Safari: reads luma-matte side-by-side MP4
      // Left half = colour, Right half = greyscale alpha mask
      AFRAME.registerShader('luma-matte', {
        schema: {
          src: { type: 'map', is: 'uniform' },
        },
        vertexShader: `
          varying vec2 vUv;
          void main() {
            vUv = uv;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
          }
        `,
        fragmentShader: `
          uniform sampler2D src;
          varying vec2 vUv;
          void main() {
            // Left half = RGB colour
            vec2 colorUV = vec2(vUv.x * 0.5, vUv.y);
            // Right half = greyscale alpha mask
            vec2 alphaUV = vec2(vUv.x * 0.5 + 0.5, vUv.y);

            vec4 color = texture2D(src, colorUV);
            float alpha = texture2D(src, alphaUV).r;

            if (alpha < 0.05) discard;
            gl_FragColor = vec4(color.rgb, alpha);
          }
        `
      });

      AFRAME.registerComponent('disable-touch-rotation', {
        init: function () {
          const stopTouch = (e) => e.stopPropagation();
          document.addEventListener('touchmove', stopTouch, { capture: true, passive: false });
        }
      });
    </script>
  </head>

  <body>

    <div id="loading-screen">
      <h1>Fusion Arts × House of Creativity</h1>
      <p>Loading AR experience…</p>
      <div class="spinner"></div>
    </div>

    <div id="tap-to-start">
      <p>Tap to start</p>
      <span>Tap anywhere to enable video</span>
    </div>

    <div id="debug">v1.9 | starting…</div>

    <div id="hint">Hold your camera up towards the building facade to reveal the experience.</div>

    <a-scene
      mindar-image="imageTargetSrc: target.mind; autoStart: true; uiLoading: no; uiError: no; uiScanning: no;"
      color-space="sRGB"
      renderer="colorManagement: true; physicallyCorrectLights: true; alpha: true; premultipliedAlpha: false"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
      disable-touch-rotation
    >
      <a-assets timeout="15000">
        <!-- Android: WebM with native alpha -->
        <video
          id="shark-video-webm"
          src="whale_shark.webm"
          loop
          muted
          playsinline
          webkit-playsinline
          crossorigin="anonymous"
          preload="auto"
        ></video>

        <!-- iOS: luma-matte side-by-side MP4 (double-width) -->
        <!-- Create with ffmpeg — see shader comment above       -->
        <video
          id="shark-video-luma"
          src="whale_shark_luma.mp4"
          loop
          muted
          playsinline
          webkit-playsinline
          crossorigin="anonymous"
          preload="auto"
        ></video>
      </a-assets>

      <a-camera look-controls="touchEnabled: false; magicWindowTrackingEnabled: false"></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-light type="ambient" color="#ffffff" intensity="0.8"></a-light>
        <a-light type="directional" color="#ffffff" intensity="1.0" position="1 2 1"></a-light>

        <!-- This element is updated dynamically once we know the platform -->
        <a-video
          id="ar-video-plane"
          position="0 0.5 0"
          width="1.6"
          height="0.9"
        ></a-video>
      </a-entity>
    </a-scene>

    <script>
      const scene    = document.querySelector('a-scene');
      const loading  = document.getElementById('loading-screen');
      const hint     = document.getElementById('hint');
      const debug    = document.getElementById('debug');
      const tapToStart = document.getElementById('tap-to-start');
      const videoPlane = document.getElementById('ar-video-plane');

      // Pick the right video element and shader based on platform
      const useIosPath  = isAppleDevice;  // true → luma-matte MP4, false → webm-alpha
      const activeVideoId     = useIosPath ? 'shark-video-luma' : 'shark-video-webm';
      const activeShader      = useIosPath ? 'luma-matte'       : 'webm-alpha';
      const sharkVideo        = document.getElementById(activeVideoId);

      // Apply the correct material to the a-video plane
      videoPlane.setAttribute('src', '#' + activeVideoId);
      videoPlane.setAttribute('material',
        'shader: ' + activeShader + '; ' +
        'src: #' + activeVideoId + '; ' +
        'transparent: true; side: double; depthWrite: false'
      );

      if (!DEBUG_MODE) debug.style.display = 'none';

      debug.innerHTML =
        'v' + VERSION +
        ' | Apple:' + isAppleDevice +
        ' Safari:' + isSafariEngine +
        ' tp:' + maxTouch +
        '<br>Shader: ' + activeShader +
        '<br>UA: ' + shortUA +
        '<br>Status: waiting for A-Frame…';

      function setDebug(status, target, video) {
        if (!DEBUG_MODE) return;
        debug.innerHTML =
          'v' + VERSION +
          ' | Apple:' + isAppleDevice +
          ' Safari:' + isSafariEngine +
          ' | Shader: ' + activeShader +
          '<br>' + status + ' | Target: ' + (target || '—') +
          '<br>Video: ' + (video || '—');
      }

      function getVideoState() {
        if (!sharkVideo) return 'no element';
        if (sharkVideo.error) return '❌ err:' + sharkVideo.error.code;
        if (sharkVideo.paused) return '⏸ paused rs:' + sharkVideo.readyState;
        return '▶ playing rs:' + sharkVideo.readyState;
      }

      function fixCameraFeed() {
        document.querySelectorAll('video').forEach(v => {
          if (!v.id) {
            v.style.position   = 'fixed';
            v.style.top        = '0';
            v.style.left       = '0';
            v.style.width      = '100vw';
            v.style.height     = '100vh';
            v.style.objectFit  = 'cover';
            v.style.zIndex     = '0';
            v.style.visibility = 'visible';
            v.style.opacity    = '1';
            v.style.display    = 'block';
          }
        });
        if (scene.renderer) {
          scene.renderer.setClearColor(0x000000, 0);
          scene.renderer.setClearAlpha(0);
        }
        document.querySelectorAll('canvas').forEach(c => {
          c.style.background      = 'transparent';
          c.style.backgroundColor = 'transparent';
        });
      }

      function tryPlay() {
        if (!sharkVideo) return;
        sharkVideo.play()
          .then(() => {
            tapToStart.classList.remove('visible');
          })
          .catch(() => {
            tapToStart.classList.add('visible');
          });
      }

      // ─── Resume video when returning to the tab/app ───────────────
      // Browsers (especially iOS Safari) pause media when backgrounded.

      document.addEventListener('visibilitychange', () => {
        if (document.visibilityState === 'visible') {
          setDebug('👁 Page visible — resuming…', null, getVideoState());
          if (sharkVideo && sharkVideo.paused) {
            sharkVideo.play().catch(e =>
              setDebug('⚠️ visibilitychange resume failed: ' + e.message, null, getVideoState())
            );
          }
        }
      });

      // iOS sometimes fires pageshow instead of visibilitychange
      window.addEventListener('pageshow', (e) => {
        setDebug('📄 pageshow persisted:' + e.persisted, null, getVideoState());
        if (sharkVideo && sharkVideo.paused) {
          sharkVideo.play().catch(e =>
            setDebug('⚠️ pageshow resume failed: ' + e.message, null, getVideoState())
          );
        }
      });

      // Also resume when the window regains focus (desktop + some mobile)
      window.addEventListener('focus', () => {
        if (sharkVideo && sharkVideo.paused) {
          sharkVideo.play().catch(() => {});
        }
      });
      // ─────────────────────────────────────────────────────────────

      if (sharkVideo) {
        sharkVideo.addEventListener('playing', () => setDebug('✅ Ready', 'searching…', '▶ playing'));
        sharkVideo.addEventListener('pause',   () => setDebug('✅ Ready', 'searching…', '⏸ paused'));
        sharkVideo.addEventListener('waiting', () => setDebug('✅ Ready', 'searching…', '⏳ buffering'));
        sharkVideo.addEventListener('error',   () => setDebug('✅ Ready', 'searching…', '❌ load error'));
        sharkVideo.addEventListener('canplay', () => setDebug('✅ Ready', 'searching…', '✅ can play'));
      }

      tapToStart.addEventListener('click', () => tryPlay());

      // Fallback: hide loading after 8s if loaded event never fires
      setTimeout(() => {
        if (loading.style.display !== 'none') {
          loading.style.opacity = '0';
          setTimeout(() => loading.style.display = 'none', 800);
          setDebug('⚠️ Loaded via timeout', 'searching…', getVideoState());
        }
      }, 8000);

      scene.addEventListener('loaded', () => {
        setDebug('✅ A-Frame loaded', 'searching…', getVideoState());
        fixCameraFeed();
        tryPlay();
        setTimeout(() => {
          loading.style.opacity = '0';
          setTimeout(() => loading.style.display = 'none', 800);
        }, 1200);
      });

      scene.addEventListener('arReady', () => {
        setDebug('✅ AR ready', 'searching…', getVideoState());
        fixCameraFeed();
      });

      let fixCount = 0;
      const fixInterval = setInterval(() => {
        fixCameraFeed();
        fixCount++;
        if (fixCount >= 10) clearInterval(fixInterval);
      }, 500);

      scene.addEventListener('arError', (e) => {
        setDebug('❌ AR Error: ' + (e.detail || 'unknown'), '—', getVideoState());
      });

      scene.addEventListener('targetFound', () => {
        setDebug('✅ AR ready', '🎯 FOUND!', getVideoState());
        hint.style.opacity = '0';
        if (sharkVideo && sharkVideo.paused) tryPlay();
      });

      scene.addEventListener('targetLost', () => {
        setDebug('✅ AR ready', 'searching…', getVideoState());
        hint.style.opacity = '1';
      });

      setTimeout(() => { hint.style.opacity = '0'; }, 5000);
    </script>

  </body>
</html>
