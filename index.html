<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>Fusion Arts AR</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      html, body {
        width: 100%; height: 100%;
        overflow: hidden;
        background: transparent;
      }

      /* Camera video feed - Mind AR injects this, we make sure it's visible */
      video {
        position: fixed !important;
        top: 0 !important; left: 0 !important;
        width: 100vw !important;
        height: 100vh !important;
        object-fit: cover !important;
        z-index: 0 !important;
      }

      /* Canvas must be transparent and sit above the video */
      canvas {
        position: fixed !important;
        top: 0 !important; left: 0 !important;
        width: 100vw !important;
        height: 100vh !important;
        background: transparent !important;
        z-index: 1 !important;
      }

      a-scene {
        width: 100vw !important;
        height: 100vh !important;
        position: fixed !important;
        top: 0 !important; left: 0 !important;
        z-index: 1 !important;
        background: transparent !important;
      }

      #loading-screen {
        position: fixed; inset: 0;
        background: #0a0a1a;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        z-index: 999; color: #fff;
        font-family: sans-serif; text-align: center;
        padding: 24px;
        transition: opacity 0.8s ease;
      }
      #loading-screen h1 {
        font-size: 22px; font-weight: 500;
        margin: 0 0 8px; color: #f5d97a;
      }
      #loading-screen p {
        font-size: 14px; opacity: 0.6; margin: 0 0 32px;
      }
      .spinner {
        width: 40px; height: 40px;
        border: 3px solid rgba(255,255,255,0.15);
        border-top-color: #f5d97a;
        border-radius: 50%;
        animation: spin 0.9s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }

      #hint {
        position: fixed; bottom: 40px; left: 50%;
        transform: translateX(-50%);
        background: rgba(0,0,0,0.6);
        color: #fff; font-family: sans-serif;
        font-size: 14px; padding: 10px 20px;
        border-radius: 24px;
        pointer-events: none;
        opacity: 1; transition: opacity 1s ease;
        z-index: 100; white-space: nowrap;
      }

      #debug {
        position: fixed; top: 12px; left: 12px; right: 12px;
        background: rgba(0,0,0,0.75);
        color: #0f0; font-family: monospace;
        font-size: 12px; padding: 8px 12px;
        border-radius: 8px;
        z-index: 200;
        line-height: 1.6;
      }
    </style>

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  </head>

  <body>

    <div id="loading-screen">
      <h1>Fusion Arts × House of Creativity</h1>
      <p>Loading AR experience…</p>
      <div class="spinner"></div>
    </div>

    <div id="debug">
      Status: starting…<br>
      Target: searching…
    </div>

    <div id="hint">Point camera at the building facade</div>

    <a-scene
      mindar-image="imageTargetSrc: target.mind; autoStart: true; uiLoading: no; uiError: no; uiScanning: no;"
      color-space="sRGB"
      renderer="colorManagement: true; physicallyCorrectLights: true; alpha: true"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-assets timeout="15000">
        <a-asset-item id="whale-model" src="whale.glb"></a-asset-item>
        <a-asset-item id="shark-model" src="shark.glb"></a-asset-item>
      </a-assets>

      <a-camera></a-camera>

      <a-entity mindar-image-target="targetIndex: 0">

        <a-light type="ambient" color="#ffffff" intensity="0.8"></a-light>
        <a-light type="directional" color="#ffffff" intensity="1.0"
          position="1 2 1"></a-light>

        <!-- Shark -->
        <a-entity
          gltf-model="#shark-model"
          position="0.5 0.9 0"
          scale="0.1 0.1 0.1"
          rotation="0 -15 -8"
          animation="property: position;
                     from: 0.5 0.9 0;
                     to: 0.5 1.1 0;
                     dur: 2500;
                     dir: alternate;
                     loop: true;
                     easing: easeInOutSine"
        ></a-entity>

        <!-- Whale: scaled up large so we can find it.
             Once visible, we'll tune position and scale together. -->
        <a-entity
          gltf-model="#whale-model"
          position="0 2 0"
          scale="1 1 1"
          rotation="0 0 0"
          animation="property: position;
                     from: 0 2 0;
                     to: 0 2.3 0;
                     dur: 3000;
                     dir: alternate;
                     loop: true;
                     easing: easeInOutSine"
        ></a-entity>

      </a-entity>
    </a-scene>

    <script>
      const scene = document.querySelector('a-scene');
      const loading = document.getElementById('loading-screen');
      const hint = document.getElementById('hint');
      const debug = document.getElementById('debug');

      function setDebug(status, target) {
        debug.innerHTML = 'Status: ' + status + '<br>Target: ' + target;
      }

      scene.addEventListener('loaded', () => {
        setDebug('✅ A-Frame loaded', 'searching…');

        // Force canvas transparency after it's created
        const canvas = document.querySelector('canvas');
        if (canvas) {
          canvas.style.background = 'transparent';
          canvas.style.backgroundColor = 'transparent';
        }

        // Force the video element to be visible behind the canvas
        // Mind AR injects it — we grab it once it exists
        setTimeout(() => {
          const video = document.querySelector('video');
          if (video) {
            video.style.position = 'fixed';
            video.style.top = '0';
            video.style.left = '0';
            video.style.width = '100vw';
            video.style.height = '100vh';
            video.style.objectFit = 'cover';
            video.style.zIndex = '0';
            setDebug('✅ A-Frame loaded — video found', 'searching…');
          } else {
            setDebug('✅ A-Frame loaded — ⚠️ no video element found', 'searching…');
          }
        }, 2000);

        setTimeout(() => {
          loading.style.opacity = '0';
          setTimeout(() => loading.style.display = 'none', 800);
        }, 1200);
      });

      scene.addEventListener('arReady', () => {
        setDebug('✅ Mind AR ready — camera live', 'searching…');

        // Try again to fix video once AR is fully initialised
        const video = document.querySelector('video');
        if (video) {
          video.style.zIndex = '0';
          video.style.position = 'fixed';
          video.style.width = '100vw';
          video.style.height = '100vh';
          video.style.objectFit = 'cover';
        }
      });

      scene.addEventListener('arError', (e) => {
        setDebug('❌ AR Error: ' + (e.detail || 'unknown'), '—');
      });

      scene.addEventListener('targetFound', () => {
        setDebug('✅ Mind AR ready', '🎯 TARGET FOUND!');
        hint.style.opacity = '0';
      });

      scene.addEventListener('targetLost', () => {
        setDebug('✅ Mind AR ready', 'searching…');
        hint.style.opacity = '1';
      });

      setTimeout(() => { hint.style.opacity = '0'; }, 5000);
    </script>

  </body>
</html>
